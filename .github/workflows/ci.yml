name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "!.changeset/**"
      - ".env.example"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "!.changeset/**"
      - ".env.example"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true
  # Electron Forge currently fails to complete packaging on Node 24.16+.
  # Keep hosted CI pinned until https://github.com/electron/forge/issues/4277 is fixed.
  NODE_VERSION: 24.15.0
  NODE_MODULES_CACHE_VERSION: v1

jobs:
  validate-release-config:
    name: Validate Release Config
    if: >-
      !contains(github.event.head_commit.message, '[ci] release') &&
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate release config
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_UMAMI_ID: ${{ secrets.VITE_UMAMI_ID }}
        run: |
          missing=0

          for secret_name in SENTRY_AUTH_TOKEN VITE_SENTRY_DSN VITE_UMAMI_ID; do
            secret_value="${!secret_name}"
            if [ -z "${secret_value//[[:space:]]/}" ]; then
              echo "::error::${secret_name} repository secret is not set or is empty"
              missing=1
            fi
          done

          for var_name in SENTRY_ORG SENTRY_PROJECT; do
            var_value="${!var_name}"
            if [ -z "${var_value//[[:space:]]/}" ]; then
              echo "::error::${var_name} repository variable is not set or is empty"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  biome:
    name: Biome
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # `noobs` is a Windows-only native module and its install script includes
      # windows.h. Linux CI skips lifecycle scripts and rebuilds only packages
      # that are needed by the individual job.
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-version: ${{ env.NODE_MODULES_CACHE_VERSION }}

      - name: Run Biome checks
        run: pnpm check

  typecheck:
    name: Typecheck
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # `noobs` is a Windows-only native module and its install script includes
      # windows.h. Linux CI skips lifecycle scripts and rebuilds only packages
      # that are needed by the individual job.
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-version: ${{ env.NODE_MODULES_CACHE_VERSION }}

      - name: Run type checks
        run: pnpm typecheck

  test-main:
    name: Main-process Tests
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # `noobs` is a Windows-only native module and its install script includes
      # windows.h. Linux CI skips lifecycle scripts and rebuilds only packages
      # that are needed by the individual job.
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-version: ${{ env.NODE_MODULES_CACHE_VERSION }}

      - name: Rebuild Electron binary
        run: pnpm rebuild electron

      - name: Run main-process tests
        run: pnpm test:main

  test-renderer:
    name: Renderer Tests
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # `noobs` is a Windows-only native module and its install script includes
      # windows.h. Linux CI skips lifecycle scripts and rebuilds only packages
      # that are needed by the individual job.
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-version: ${{ env.NODE_MODULES_CACHE_VERSION }}

      - name: Run renderer tests
        run: pnpm test:renderer

  rust-helper:
    name: Rust Process Helper
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt

      - name: Check helper formatting
        run: node scripts/run-msvc-cargo.mjs fmt --manifest-path helpers/poe-process-helper/Cargo.toml --check

      - name: Lint helper
        run: node scripts/run-msvc-cargo.mjs clippy --manifest-path helpers/poe-process-helper/Cargo.toml --locked -- -D warnings

      - name: Test helper
        run: node scripts/run-msvc-cargo.mjs test --manifest-path helpers/poe-process-helper/Cargo.toml --locked

      - name: Smoke test helper protocol
        shell: powershell
        run: |
          $helperTitle = "Hinekora PoE Process Watcher"

          $output = node scripts/run-msvc-cargo.mjs run --quiet --manifest-path helpers/poe-process-helper/Cargo.toml --locked -- --once --title $helperTitle
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $payload = $output | Select-Object -Last 1 | ConvertFrom-Json
          if ($payload.type -ne "state") {
            Write-Host "::error::PoE process helper did not emit a state payload"
            exit 1
          }

          $failureOutput = node scripts/run-msvc-cargo.mjs run --quiet --manifest-path helpers/poe-process-helper/Cargo.toml --locked -- --parent-pid 4294967295 --title $helperTitle
          $failureExitCode = $LASTEXITCODE
          if ($failureExitCode -eq 0) {
            Write-Host "::error::PoE process helper accepted an invalid parent PID"
            exit 1
          }

          $failurePayload = $failureOutput | Select-Object -Last 1 | ConvertFrom-Json
          if ($failurePayload.type -ne "error") {
            Write-Host "::error::PoE process helper did not emit an error payload for invalid parent PID"
            exit 1
          }
          if ($failurePayload.message -notlike "Parent process watch failed for PID 4294967295:*") {
            Write-Host "::error::PoE process helper emitted an unexpected invalid parent PID error"
            exit 1
          }
          exit 0

  package-windows:
    name: Windows Package Check
    needs: [biome, typecheck, test-main, test-renderer, rust-helper]
    # Version-bump commits skip the regular quality jobs, but packaging still
    # needs to fail in CI before the Publish workflow reaches upload steps.
    if: >-
      always() &&
      !cancelled() &&
      (
        (
          github.event_name == 'push' &&
          contains(github.event.head_commit.message, '[ci] release')
        ) ||
        (
          needs.biome.result == 'success' &&
          needs.typecheck.result == 'success' &&
          needs['test-main'].result == 'success' &&
          needs['test-renderer'].result == 'success' &&
          needs['rust-helper'].result == 'success'
        )
      )
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-version: ${{ env.NODE_MODULES_CACHE_VERSION }}
          install-command: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.1

      - name: Package Windows app
        run: pnpm package

      - name: Verify process helper packaged
        shell: powershell
        run: .\.github\scripts\assert-process-helper-packaged.ps1
