name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "!.changeset/**"
      - ".env.example"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "!.changeset/**"
      - ".env.example"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true
  # Electron Forge currently fails to complete packaging on Node 24.16+.
  # Keep hosted CI pinned until https://github.com/electron/forge/issues/4277 is fixed.
  NODE_VERSION: 24.15.0
  NODE_MODULES_CACHE_VERSION: v1

jobs:
  validate-release-secrets:
    name: Validate Release Secrets
    if: >-
      !contains(github.event.head_commit.message, '[ci] release') &&
      (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate release secrets
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_UMAMI_ID: ${{ secrets.VITE_UMAMI_ID }}
        run: |
          missing=0

          for secret_name in SENTRY_AUTH_TOKEN VITE_SENTRY_DSN VITE_UMAMI_ID; do
            secret_value="${!secret_name}"
            if [ -z "${secret_value//[[:space:]]/}" ]; then
              echo "::error::${secret_name} repository secret is not set or is empty"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  biome:
    name: Biome
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # `noobs` is a Windows-only native module and its install script includes
      # windows.h. Linux CI skips lifecycle scripts and rebuilds only packages
      # that are needed by the individual job.
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-version: ${{ env.NODE_MODULES_CACHE_VERSION }}

      - name: Run Biome checks
        run: pnpm check

  typecheck:
    name: Typecheck
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # `noobs` is a Windows-only native module and its install script includes
      # windows.h. Linux CI skips lifecycle scripts and rebuilds only packages
      # that are needed by the individual job.
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-version: ${{ env.NODE_MODULES_CACHE_VERSION }}

      - name: Run type checks
        run: pnpm typecheck

  test-main:
    name: Main-process Tests
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # `noobs` is a Windows-only native module and its install script includes
      # windows.h. Linux CI skips lifecycle scripts and rebuilds only packages
      # that are needed by the individual job.
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-version: ${{ env.NODE_MODULES_CACHE_VERSION }}

      - name: Rebuild Electron binary
        run: pnpm rebuild electron

      - name: Run main-process tests
        run: pnpm test:main

  test-renderer:
    name: Renderer Tests
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # `noobs` is a Windows-only native module and its install script includes
      # windows.h. Linux CI skips lifecycle scripts and rebuilds only packages
      # that are needed by the individual job.
      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-version: ${{ env.NODE_MODULES_CACHE_VERSION }}

      - name: Run renderer tests
        run: pnpm test:renderer

  package-windows:
    name: Windows Package Check
    needs: [biome, typecheck, test-main, test-renderer]
    if: "!contains(github.event.head_commit.message, '[ci] release')"
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js and dependencies
        uses: ./.github/actions/setup-pnpm-node
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache-version: ${{ env.NODE_MODULES_CACHE_VERSION }}
          install-command: pnpm install --frozen-lockfile

      - name: Package Windows app
        run: pnpm package
